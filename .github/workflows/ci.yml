name: CI

on:
  push:
    branches-ignore:
      - gh-pages
  pull_request:

env:
  # renovate: datasource=github-releases depName=godotengine/godot versioning=loose
  GODOT_RELEASE: 3.5.3-stable

jobs:
  version-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      version_changed: ${{ steps.diff.outputs.version_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION_VALUE="$(tr -d '[:space:]' < VERSION)"
          echo "version=$VERSION_VALUE" >> "$GITHUB_OUTPUT"

      - name: Check changed files
        id: diff
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            RANGE_START="$BASE_SHA"
          else
            RANGE_START="$BEFORE_SHA"
          fi

          if [[ -z "$RANGE_START" || "$RANGE_START" == "0000000000000000000000000000000000000000" ]]; then
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED_FILES="$(git diff --name-only "$RANGE_START" "$HEAD_SHA")"
          echo "$CHANGED_FILES"

          PRODUCT_CHANGED=false
          VERSION_CHANGED=false
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            if [[ "$file" == "VERSION" ]]; then
              VERSION_CHANGED=true
            fi
            if [[ "$file" =~ ^(scripts/|scenes/|assets/|data/|project\.godot|export_presets\.cfg) ]]; then
              PRODUCT_CHANGED=true
            fi
          done <<< "$CHANGED_FILES"

          if [[ "$PRODUCT_CHANGED" == "true" && "$VERSION_CHANGED" != "true" ]]; then
            echo "Product files changed without a VERSION bump." >&2
            exit 1
          fi

          echo "version_changed=$VERSION_CHANGED" >> "$GITHUB_OUTPUT"
  test-and-build:
    needs: version-check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip wget xvfb libglu1-mesa coreutils

      - name: Download Godot runtime
        run: |
          GODOT_RUNTIME_SHA256="fe26dfed51e50f75b60d14805f696075e7ef9f10a357be71b540c704e00ef33e"
          mkdir -p tools/godot3
          wget -O tools/godot3.zip "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/Godot_v${GODOT_RELEASE}_x11.64.zip"
          echo "$GODOT_RUNTIME_SHA256  tools/godot3.zip" | sha256sum --check --
          unzip -oq tools/godot3.zip -d tools/godot3
          chmod +x "tools/godot3/Godot_v${GODOT_RELEASE}_x11.64"

      - name: Ensure scripts are executable
        run: |
          chmod +x run_demo.sh
          chmod +x testing/run_agent.sh
          chmod +x scripts/build_exports.sh

      - name: Run headless gameplay tests
        run: xvfb-run -a ./testing/run_agent.sh

      - name: Build export artifacts
        run: xvfb-run -a ./scripts/build_exports.sh

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: testing-reports
          path: |
            testing/reports/latest.md
            testing/reports/latest.json

      - name: Upload release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-artifacts
          path: dist/releases/*

      - name: Upload HTML5 site artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: html5-site
          path: dist/staging/html5

  publish-release:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main') && needs.version-check.outputs.version_changed == 'true'
    needs: [version-check, test-and-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download release artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-artifacts
          path: dist/releases

      - name: Publish versioned release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          tag_name: v${{ needs.version-check.outputs.version }}
          name: v${{ needs.version-check.outputs.version }}
          prerelease: false
          generate_release_notes: false
          make_latest: true
          body: |
            Automated release for version `${{ needs.version-check.outputs.version }}` from `${{ github.sha }}`.

            Included assets:
            - Linux desktop build
            - Windows desktop build
            - HTML5 browser bundle
          files: |
            dist/releases/RabbitHuntTrainer-linux-x86_64.zip
            dist/releases/RabbitHuntTrainer-windows-x86_64.zip
            dist/releases/RabbitHuntTrainer-html5.zip

  publish-pages-site:
    if: github.event_name == 'push' && github.ref != 'refs/heads/gh-pages'
    needs: test-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Download HTML5 site artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: html5-site
          path: dist/staging/html5

      - name: Ensure publish script is executable
        run: chmod +x scripts/update_pages_branch.sh

      - name: Publish branch preview to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          if [[ "$TARGET_BRANCH" == "master" || "$TARGET_BRANCH" == "main" ]]; then
            TARGET_DIR=""
            PREVIEW_URL="https://leeroywking.github.io/radio_game/"
          else
            TARGET_DIR="previews/$TARGET_BRANCH"
            PREVIEW_URL="https://leeroywking.github.io/radio_game/$TARGET_DIR/"
          fi
          ./scripts/update_pages_branch.sh "dist/staging/html5" "$TARGET_DIR" "Publish site for $TARGET_BRANCH"
          echo "Preview URL: $PREVIEW_URL" >> "$GITHUB_STEP_SUMMARY"
