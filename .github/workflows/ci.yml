name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip wget xvfb libglu1-mesa

      - name: Download Godot runtime
        run: |
          mkdir -p tools/godot3
          wget -O tools/godot3.zip https://github.com/godotengine/godot/releases/download/3.5.3-stable/Godot_v3.5.3-stable_x11.64.zip
          unzip -oq tools/godot3.zip -d tools/godot3
          chmod +x tools/godot3/Godot_v3.5.3-stable_x11.64

      - name: Ensure scripts are executable
        run: |
          chmod +x run_demo.sh
          chmod +x testing/run_agent.sh
          chmod +x scripts/build_exports.sh

      - name: Run headless gameplay tests
        run: xvfb-run -a ./testing/run_agent.sh

      - name: Build export artifacts
        run: xvfb-run -a ./scripts/build_exports.sh

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: testing-reports
          path: |
            testing/reports/latest.md
            testing/reports/latest.json

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/releases/*

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/staging/html5

      - name: Publish rolling prototype release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: prototype-latest
          name: Prototype Latest
          prerelease: true
          generate_release_notes: false
          make_latest: true
          body: |
            Latest automated prototype build from `${{ github.sha }}`.

            Included assets:
            - Linux desktop build
            - Windows desktop build
            - HTML5 browser bundle
          files: |
            dist/releases/RabbitHuntTrainer-linux-x86_64.zip
            dist/releases/RabbitHuntTrainer-windows-x86_64.zip
            dist/releases/RabbitHuntTrainer-html5.zip

  deploy-pages:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    needs: test-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
