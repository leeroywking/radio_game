name: Bug report
description: Report a defect or regression in the game, build pipeline, or repo automation.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: List the shortest path to reproduce the issue.
      placeholder: |
        1. Run ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, browser/runtime, branch or release, and any other relevant context.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste command output, stack traces, or attach screenshots if helpful.
